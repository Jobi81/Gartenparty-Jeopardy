<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gartenparty Jeopardy PRO 2026</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0f1a 0%, #151528 50%, #0b0b14 100%);
      --card-bg: rgba(22, 22, 39, 0.75);
      --accent-color: #ffcc00;
      --cyan-neon: #00f2fe;
      --text-light: #f4f4f9;
      --success: #00ffcc;
      --danger: #ff3333;
    }
    body { font-family: sans-serif; text-align: center; background: var(--bg-gradient); color: var(--text-light); margin: 0; min-height: 100vh; padding: 20px; }
    .network-status { position: fixed; top: 10px; left: 10px; padding: 5px 10px; border-radius: 15px; font-size: 10px; z-index: 9999; }
    .status-online { background: rgba(0, 255, 204, 0.2); color: var(--success); }
    .status-offline { background: rgba(255, 51, 51, 0.2); color: var(--danger); }
    .jeopardy-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 800px; margin: 20px auto; }
    .matrix-cell { background: var(--card-bg); padding: 20px; border: 1px solid #444; cursor: pointer; font-weight: bold; }
    .team-btn { display: block; width: 80%; margin: 10px auto; padding: 15px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="net-indicator" class="network-status status-offline">Verbindung prüfen...</div>

  <div id="login-screen" style="display: block;">
    <h1>Gartenparty Jeopardy</h1>
    <button class="team-btn" onclick="loginTeam('Hopfen')">Team Hopfen</button>
    <button class="team-btn" onclick="loginTeam('Malz')">Team Malz</button>
  </div>

  <div id="board-screen" style="display: none;">
    <h2 id="display-team"></h2>
    <div class="jeopardy-grid" id="matrix-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let supabaseClientInstance = null;
    const supabaseUrl = "https://accjeyhsrghbxezyboxt.supabase.co";
    // HIER DEINEN ANALOGEN ANON-KEY EINFÜGEN (Den langen eyJ... Key aus dem Legacy-Reiter)
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjY2pleWhzcmdoYnhlenlib3h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mjg5ODIsImV4cCI6MjA5NzEwNDk4Mn0.njbnA14y98wuVdoPJHlk3tsBBQcOCC4A0nOfBUrlqzQ"; 

    function updateVisualStatus(isLive) {
      const indicator = document.getElementById("net-indicator");
      indicator.className = isLive ? "network-status status-online" : "network-status status-offline";
      indicator.innerText = isLive ? "🟢 LIVE" : "🔴 OFFLINE";
    }

    function loginTeam(teamName) {
      supabaseClientInstance = window.supabase.createClient(supabaseUrl, supabaseKey);
      
      supabaseClientInstance.from("jeopardy_questions").select("*").then(res => {
        if (res.error) throw res.error;
        updateVisualStatus(true);
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("board-screen").style.display = "block";
        document.getElementById("display-team").innerText = "Team: " + teamName;
      }).catch(err => {
        console.error(err);
        updateVisualStatus(false);
        alert("Fehler: " + err.message);
      });
    }
  </script>
</body>
</html>
