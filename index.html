<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gartenparty Jeopardy PRO 2026</title>
  <style>
    :root { --bg: #0f0f1a; --card: rgba(22, 22, 39, 0.75); --cyan: #00f2fe; }
    body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 20px; }
    .jeopardy-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; }
    .matrix-cell { background: var(--card); padding: 20px; border: 1px solid #444; cursor: pointer; border-radius: 8px; font-weight: bold; }
    
    /* Das neue Quiz-Fenster */
    #question-modal { display: none; position: fixed; top: 20%; left: 10%; width: 80%; background: #1a1a2e; padding: 30px; border: 2px solid var(--cyan); border-radius: 15px; z-index: 1000; }
    .answer-btn { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #333; color: white; border: none; cursor: pointer; border-radius: 5px; }
  </style>
</head>
<body>

  <div id="board-screen">
    <div class="jeopardy-grid" id="matrix-container"></div>
  </div>

  <div id="question-modal">
    <h2 id="q-text">Frage hier...</h2>
    <div id="answers-container"></div>
    <button onclick="document.getElementById('question-modal').style.display='none'">Schließen</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://accjeyhsrghbxezyboxt.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjY2pleWhzcmdoYnhlenlib3h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mjg5ODIsImV4cCI6MjA5NzEwNDk4Mn0.njbnA14y98wuVdoPJHlk3tsBBQcOCC4A0nOfBUrlqzQ";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Initialisierung wie gehabt...
    async function initGame() {
      const { data } = await supabaseClient.from("jeopardy_questions").select("*");
      buildMatrix(data);
    }

    function buildMatrix(questions) {
      const container = document.getElementById('matrix-container');
      const categories = [...new Set(questions.map(q => q.category))];
      // ... (Matrix-Bau wie vorher)
      // WICHTIG: Die onclick-Funktion ist jetzt neu:
      questions.forEach(q => {
        let div = document.createElement('div');
        div.className = 'matrix-cell';
        div.innerText = q.points;
        div.onclick = () => showQuestion(q);
        container.appendChild(div);
      });
    }

    function showQuestion(q) {
      document.getElementById('q-text').innerText = q.question;
      const container = document.getElementById('answers-container');
      container.innerHTML = "";
      
      const options = [q.answer_a, q.answer_b, q.answer_c, q.answer_d];
      options.forEach(opt => {
        let btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerText = opt;
        btn.onclick = () => alert(opt === q.correct_answer ? "Richtig! ✅" : "Leider falsch ❌");
        container.appendChild(btn);
      });
      document.getElementById('question-modal').style.display = 'block';
    }

    initGame();
  </script>
</body>
</html>
