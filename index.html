<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gartenparty Jeopardy PRO 2026</title>
  <style>
    :root { --bg: #0f0f1a; --card: rgba(22, 22, 39, 0.85); --accent: #ffcc00; --cyan: #00f2fe; --success: #00ffcc; --danger: #ff3333; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 20px; }
    
    .jeopardy-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1000px; margin: 30px auto; }
    .matrix-cell { 
      background: var(--card); padding: 40px 10px; border: 2px solid rgba(255, 204, 0, 0.3); border-radius: 12px; 
      cursor: pointer; font-size: 3rem; font-weight: 900; color: var(--accent); transition: 0.3s; 
      display: flex; align-items: center; justify-content: center;
    }
    .matrix-cell:hover { border-color: var(--cyan); transform: scale(1.05); }
    .category-title { font-weight: 900; color: var(--cyan); padding: 15px; font-size: 1.1rem; text-transform: uppercase; }

    #question-modal { display: none; position: fixed; top: 10%; left: 10%; width: 80%; background: var(--card); padding: 50px; border: 3px solid var(--cyan); border-radius: 25px; z-index: 1000; }
    .answer-btn { display: block; width: 100%; margin: 15px 0; padding: 22px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; cursor: pointer; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Gartenparty Jeopardy PRO</h1>
  <div class="jeopardy-grid" id="matrix-container"></div>

  <div id="question-modal">
    <h2 id="q-text" style="color: var(--accent); font-size: 2rem; margin-bottom: 30px;"></h2>
    <div id="answers-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://accjeyhsrghbxezyboxt.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjY2pleWhzcmdoYnhlenlib3h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mjg5ODIsImV4cCI6MjA5NzEwNDk4Mn0.njbnA14y98wuVdoPJHlk3tsBBQcOCC4A0nOfBUrlqzQ";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function initGame() {
      const { data, error } = await supabaseClient.from("jeopardy_questions").select("*");
      if (error) { console.error(error); return; }
      
      const catMap = ["Abkürzungen", "Bierländer", "Fussball-WM", "Geografie", "Unnützes Wissen"];
      buildMatrix(data, catMap);
    }

    function buildMatrix(questions, catMap) {
      const container = document.getElementById('matrix-container');
      container.innerHTML = "";
      
      catMap.forEach(cat => {
        let div = document.createElement('div');
        div.className = 'category-title';
        div.innerText = cat;
        container.appendChild(div);
      });

      for (let p = 1; p <= 5; p++) {
        catMap.forEach(cat => {
          const q = questions.find(item => 
            item.points == p && 
            item.category.trim().toLowerCase() === cat.toLowerCase()
          );
          
          let div = document.createElement('div');
          div.className = 'matrix-cell';
          if (q) {
            div.innerText = q.points;
            div.onclick = () => showQuestion(q);
          } else {
            div.innerText = "-";
            div.style.opacity = "0.1";
          }
          container.appendChild(div);
        });
      }
    }

    function showQuestion(q) {
      document.getElementById('q-text').innerText = q.question;
      const container = document.getElementById('answers-container');
      container.innerHTML = "";
      [q.answer_a, q.answer_b, q.answer_c, q.answer_d].forEach(opt => {
        let btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerText = opt;
        btn.onclick = () => {
          const isCorrect = (opt === q.correct_answer);
          btn.style.background = isCorrect ? 'var(--success)' : 'var(--danger)';
          if(!isCorrect) {
             Array.from(container.children).forEach(b => {
               if(b.innerText === q.correct_answer) b.style.background = 'var(--success)';
             });
          }
          setTimeout(() => { document.getElementById('question-modal').style.display = 'none'; }, 2000);
        };
        container.appendChild(btn);
      });
      document.getElementById('question-modal').style.display = 'block';
    }

    initGame();
  </script>
</body>
</html>
